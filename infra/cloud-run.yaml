apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: flow-server
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/description: "Flow — Predictive Stadium Ambient Intelligence Server"
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: flow-server@${PROJECT_ID}.iam.gserviceaccount.com
      containers:
        - image: gcr.io/${PROJECT_ID}/flow-server:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 3
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: EVENT_ID
              value: demo-event-001
            - name: DEMO_MODE
              value: "true"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: GEMINI_API_KEY
            - name: MAPS_API_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: MAPS_API_KEY
            - name: FIREBASE_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: FIREBASE_PROJECT_ID
            - name: DEMO_SECRET
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: DEMO_SECRET
